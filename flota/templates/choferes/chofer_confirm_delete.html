{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">¿Eliminar Chofer?</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">¿Estás seguro de que querés eliminar al chofer <strong>{{ object.apellido }} {{ object.nombre }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Sí, Eliminar</button>
                    <a href="{% url 'chofer_list' %}" class="btn btn-secondary px-4">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
